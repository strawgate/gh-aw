          GH_AW_INFO_VERSION: "0.129.0"
          GH_AW_INFO_AGENT_VERSION: "0.129.0"
          GH_AW_INFO_WORKFLOW_NAME: "Issue Arborist"
          GH_AW_INFO_EXPERIMENTAL: "false"
