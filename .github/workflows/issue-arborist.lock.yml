          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/issue-arborist.lock.yml@${{ github.ref }}
          GH_AW_INFO_VERSION: "0.129.0"
      - name: Mask OTLP telemetry headers
