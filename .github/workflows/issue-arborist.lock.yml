            const substitutePlaceholders = require('${{ runner.temp }}/gh-aw/actions/substitute_placeholders.cjs');
            
            // Call the substitution function
            return await substitutePlaceholders({
              file: process.env.GH_AW_PROMPT,
              substitutions: {
                GH_AW_EXPERIMENTS_PROMPT_STYLE: process.env.GH_AW_EXPERIMENTS_PROMPT_STYLE,
                GH_AW_EXPR_1A3A194A: process.env.GH_AW_EXPR_1A3A194A,
                GH_AW_EXPR_463A214A: process.env.GH_AW_EXPR_463A214A,
                GH_AW_EXPR_802A9F6A: process.env.GH_AW_EXPR_802A9F6A,
                GH_AW_EXPR_FF1D34CE: process.env.GH_AW_EXPR_FF1D34CE,
                GH_AW_GITHUB_ACTOR: process.env.GH_AW_GITHUB_ACTOR,
                GH_AW_GITHUB_REPOSITORY: process.env.GH_AW_GITHUB_REPOSITORY,
                GH_AW_GITHUB_RUN_ID: process.env.GH_AW_GITHUB_RUN_ID,
                GH_AW_GITHUB_WORKSPACE: process.env.GH_AW_GITHUB_WORKSPACE,
                GH_AW_MCP_CLI_SERVERS_LIST: process.env.GH_AW_MCP_CLI_SERVERS_LIST
              }
            });
      - name: Validate prompt placeholders
        env:
          GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
        # poutine:ignore untrusted_checkout_exec
        run: bash "${RUNNER_TEMP}/gh-aw/actions/validate_prompt_placeholders.sh"
      - name: Print prompt
        env:
          GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
        # poutine:ignore untrusted_checkout_exec
        run: bash "${RUNNER_TEMP}/gh-aw/actions/print_prompt_summary.sh"
      - name: Upload activation artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: activation
          include-hidden-files: true
          path: |
            /tmp/gh-aw/aw_info.json
            /tmp/gh-aw/aw-prompts/prompt.txt
            /tmp/gh-aw/aw-prompts/prompt-template.txt
            /tmp/gh-aw/aw-prompts/prompt-import-tree.json
            /tmp/gh-aw/github_rate_limits.jsonl
            /tmp/gh-aw/base
            /tmp/gh-aw/.codex/agents
          if-no-files-found: ignore
          retention-days: 1

  agent:
    needs:
      - activation
      - repo-mind-light-prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    concurrency:
      group: "gh-aw-codex-${{ github.workflow }}"
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GH_AW_ASSETS_ALLOWED_EXTS: ""
      GH_AW_ASSETS_BRANCH: ""
      GH_AW_ASSETS_MAX_SIZE_KB: 0
      GH_AW_MCP_LOG_DIR: /tmp/gh-aw/mcp-logs/safeoutputs
      GH_AW_WORKFLOW_ID_SANITIZED: issuearborist
    outputs:
      checkout_pr_success: ${{ steps.checkout-pr.outputs.checkout_pr_success || 'true' }}
      effective_tokens: ${{ steps.parse-mcp-gateway.outputs.effective_tokens }}
      effective_tokens_rate_limit_error: ${{ steps.parse-mcp-gateway.outputs.effective_tokens_rate_limit_error || 'false' }}
      has_patch: ${{ steps.collect_output.outputs.has_patch }}
      model: ${{ needs.activation.outputs.model }}
      output: ${{ steps.collect_output.outputs.output }}
      output_types: ${{ steps.collect_output.outputs.output_types }}
      setup-parent-span-id: ${{ steps.setup.outputs.parent-span-id || steps.setup.outputs.span-id }}
      setup-span-id: ${{ steps.setup.outputs.span-id }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
    steps:
      - name: Checkout actions folder
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: github/gh-aw
          sparse-checkout: |
            actions
          persist-credentials: false
      - name: Setup Scripts
        id: setup
        uses: ./actions/setup
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
          parent-span-id: ${{ needs.activation.outputs.setup-parent-span-id || needs.activation.outputs.setup-span-id }}
        env:
          GH_AW_SETUP_WORKFLOW_NAME: "Issue Arborist"
          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/issue-arborist.lock.yml@${{ github.ref }}
          GH_AW_INFO_VERSION: "0.129.0"
      - name: Set runtime paths
        id: set-runtime-paths
        run: |
          {
            echo "GH_AW_SAFE_OUTPUTS=${RUNNER_TEMP}/gh-aw/safeoutputs/outputs.jsonl"
            echo "GH_AW_SAFE_OUTPUTS_CONFIG_PATH=${RUNNER_TEMP}/gh-aw/safeoutputs/config.json"
            echo "GH_AW_SAFE_OUTPUTS_TOOLS_PATH=${RUNNER_TEMP}/gh-aw/safeoutputs/tools.json"
          } >> "$GITHUB_OUTPUT"
      - name: Mask OTLP telemetry headers
        run: bash "${RUNNER_TEMP}/gh-aw/actions/mask_otlp_headers.sh"
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Create gh-aw temp directory
        run: bash "${RUNNER_TEMP}/gh-aw/actions/create_gh_aw_tmp_dir.sh"
      - name: Configure gh CLI for GitHub Enterprise
        run: bash "${RUNNER_TEMP}/gh-aw/actions/configure_gh_for_ghe.sh"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Start DIFC Proxy
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          DIFC_PROXY_POLICY: '{"allow-only":{"min-integrity":"approved","repos":"all"}}'
          DIFC_PROXY_IMAGE: 'ghcr.io/github/gh-aw-mcpg:v0.3.8'
        run: |
          bash "${RUNNER_TEMP}/gh-aw/actions/start_difc_proxy.sh"
      - name: Setup jq utilities directory
        run: |
          mkdir -p /tmp/gh-aw
          cp "$GITHUB_WORKSPACE/.github/skills/jqschema/jqschema.sh" /tmp/gh-aw/jqschema.sh
          chmod +x /tmp/gh-aw/jqschema.sh
        env:
          GH_HOST: localhost:18443
          GH_REPO: ${{ github.repository }}
          GITHUB_API_URL: https://localhost:18443/api/v3
          GITHUB_GRAPHQL_URL: https://localhost:18443/api/graphql
          NODE_EXTRA_CA_CERTS: /tmp/gh-aw/proxy-logs/proxy-tls/ca.crt
      - name: Fetch issues
        run: |
          set -euo pipefail

          # Create output directory
          mkdir -p /tmp/gh-aw/issues-data

          echo "⬇ Downloading the last 100 open issues (excluding sub-issues)..."

          # Fetch the last 100 open issues that don't have a parent issue.
          # Use the REST API directly because `gh issue list` probes `/meta`, which
          # is not exposed by the pre-agent GitHub proxy.
          curl --fail-with-body --silent --show-error \
            --cacert /tmp/gh-aw/proxy-logs/proxy-tls/ca.crt \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --get "${GITHUB_API_URL}/search/issues" \
            --data-urlencode "q=repo:${GITHUB_REPOSITORY} is:issue is:open -parent-issue:* sort:updated-desc" \
            --data-urlencode "per_page=100" \
            | jq '[.items[] | {
                number,
                title,
                author: .user,
                createdAt: .created_at,
                state: (.state | ascii_upcase),
                url: .html_url,
                body,
                labels,
                updatedAt: .updated_at,
                closedAt: .closed_at,
                milestone,
                assignees
              }]' \
            > /tmp/gh-aw/issues-data/issues.json

          # Generate schema for reference using jqschema
          /tmp/gh-aw/jqschema.sh < /tmp/gh-aw/issues-data/issues.json > /tmp/gh-aw/issues-data/issues-schema.json

          echo "✓ Issues data saved to /tmp/gh-aw/issues-data/issues.json"
          echo "✓ Schema saved to /tmp/gh-aw/issues-data/issues-schema.json"
          echo "Total issues fetched: $(jq 'length' /tmp/gh-aw/issues-data/issues.json)"
          echo ""
          echo "Schema of the issues data:"
          cat /tmp/gh-aw/issues-data/issues-schema.json | jq .
        env:
          GH_HOST: localhost:18443
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: https://localhost:18443/api/v3
          GITHUB_GRAPHQL_URL: https://localhost:18443/api/graphql
          GITHUB_TOKEN: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_EXTRA_CA_CERTS: /tmp/gh-aw/proxy-logs/proxy-tls/ca.crt
      - name: Configure Git credentials
        env:
          REPO_NAME: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global am.keepcr true
          # Re-authenticate git with GitHub token
          SERVER_URL_STRIPPED="${SERVER_URL#https://}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@${SERVER_URL_STRIPPED}/${REPO_NAME}.git"
          echo "Git configured with standard GitHub Actions identity"
      - name: Checkout PR branch
        id: checkout-pr
        if: |
          github.event.pull_request || github.event.issue.pull_request
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/checkout_pr_branch.cjs');
            await main();
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Install Codex CLI
        run: npm install --ignore-scripts -g @openai/codex@0.129.0
      - name: Install AWF binary
        run: bash "${RUNNER_TEMP}/gh-aw/actions/install_awf_binary.sh" v0.25.46
      - name: Parse integrity filter lists
        id: parse-guard-vars
        env:
          GH_AW_BLOCKED_USERS_VAR: ${{ vars.GH_AW_GITHUB_BLOCKED_USERS || '' }}
          GH_AW_TRUSTED_USERS_VAR: ${{ vars.GH_AW_GITHUB_TRUSTED_USERS || '' }}
          GH_AW_APPROVAL_LABELS_EXTRA: cookie,community
          GH_AW_APPROVAL_LABELS_VAR: ${{ vars.GH_AW_GITHUB_APPROVAL_LABELS || '' }}
        run: bash "${RUNNER_TEMP}/gh-aw/actions/parse_guard_list.sh"
      - name: Stop DIFC Proxy
        if: always()
        continue-on-error: true
        run: bash "${RUNNER_TEMP}/gh-aw/actions/stop_difc_proxy.sh"
      - name: Download activation artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: activation
          path: /tmp/gh-aw
      - name: Restore agent config folders from base branch
        if: steps.checkout-pr.outcome == 'success'
        env:
          GH_AW_AGENT_FOLDERS: ".agents .claude .codex .crush .gemini .github .opencode .pi"
          GH_AW_AGENT_FILES: ".crush.json AGENTS.md CLAUDE.md GEMINI.md PI.md opencode.jsonc"
        run: bash "${RUNNER_TEMP}/gh-aw/actions/restore_base_github_folders.sh"
      - name: Restore inline sub-agents from activation artifact
        env:
          GH_AW_SUB_AGENT_DIR: ".codex/agents"
          GH_AW_SUB_AGENT_EXT: ".md"
        run: bash "${RUNNER_TEMP}/gh-aw/actions/restore_inline_sub_agents.sh"
      - name: Download Repo Mind Light index artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.activation.outputs.artifact_prefix }}repo-mind-light-index
          path: .index-store
      - name: Ensure Repo Mind Light directories exist
        run: |
          mkdir -p .index-store /tmp/gh-aw/mcp-logs
          chmod -R a+rwX .index-store /tmp/gh-aw/mcp-logs
      - env:
          REPO_MIND_LIGHT_CONFIG_MAP: "{\"yaml\":\"slug: ${{ github.repository }}\\nstore_path: /var/lib/repo-mind-light/index\\nrefresh_if_older_than: 1d\\nconversations:\\n  issue_state: open\\n  pr_state: none\\n  discussion_state: none\\n  ignore_bot_authored: true\\nquery:\\n  preload_query_sources_on_startup: true\\n\"}"
        name: Write Repo Mind Light config
        run: "set -euo pipefail\nif printf '%s' \"$REPO_MIND_LIGHT_CONFIG_MAP\" | jq -e . >/dev/null 2>&1; then\n  config_yaml=\"$(printf '%s' \"$REPO_MIND_LIGHT_CONFIG_MAP\" | jq -re '.yaml | select(type == \"string\")')\"\nelse\n  config_yaml=\"${REPO_MIND_LIGHT_CONFIG_MAP#map[yaml:}\"\n  config_yaml=\"${config_yaml%]}\"\nfi\nprintf '%s\\n' \"$config_yaml\" > .repo-mind-light.config.yml\n"
      - env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.GH_AW_REPO_MIND_LIGHT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO_MIND_LIGHT_CONTAINER_NAME: repo-mind-light-mcp
          REPO_MIND_LIGHT_IMAGE: ghcr.io/githubnext/repo-mind-light@sha256:e297865cada91f345269b91ee88bfd1915dbe153678976b521a504a4add47a75
        name: Start Repo Mind Light MCP server
        run: "set -euo pipefail\ndocker rm -f \"$REPO_MIND_LIGHT_CONTAINER_NAME\" >/dev/null 2>&1 || true\ndocker pull \"$REPO_MIND_LIGHT_IMAGE\"\n\ndocker run -d \\\n  --name \"$REPO_MIND_LIGHT_CONTAINER_NAME\" \\\n  -p 8000:8000 \\\n  -v \"$PWD/.index-store:/var/lib/repo-mind-light/index\" \\\n  -v \"$PWD/.repo-mind-light.config.yml:/tmp/repo-mind-light.config.yml:ro\" \\\n  -e COPILOT_GITHUB_TOKEN \\\n  -e GITHUB_TOKEN \\\n  -e REPO_MIND_LIGHT_CONFIG=/tmp/repo-mind-light.config.yml \\\n  \"$REPO_MIND_LIGHT_IMAGE\"\n"
      - env:
          REPO_MIND_LIGHT_CONTAINER_NAME: repo-mind-light-mcp
        name: Capture initial Repo Mind Light logs
        run: "docker logs \"$REPO_MIND_LIGHT_CONTAINER_NAME\" \\\n  > /tmp/gh-aw/mcp-logs/repo-mind-light-startup.log 2>&1 || true\n"
      - env:
          REPO_MIND_LIGHT_CONTAINER_NAME: repo-mind-light-mcp
        name: Wait for Repo Mind Light preload readiness
        run: "set -euo pipefail\nstatus_file='/tmp/gh-aw/mcp-logs/repo-mind-light-preload-status.json'\nstatus_url='http://127.0.0.1:8000/preload-status'\n\nfor attempt in $(seq 1 120); do\n  if ! docker ps --format '{{.Names}}' | grep -Fxq \"$REPO_MIND_LIGHT_CONTAINER_NAME\"; then\n    echo 'Repo Mind Light MCP container exited before preload completed.' >&2\n    docker logs \"$REPO_MIND_LIGHT_CONTAINER_NAME\" >&2 || true\n    exit 1\n  fi\n\n  if response=\"$(curl --silent --fail --max-time 5 \"$status_url\" 2>/dev/null)\"; then\n    printf '%s\\n' \"$response\" > \"$status_file\"\n    ready=\"$(jq -r '.ready' \"$status_file\")\"\n    state=\"$(jq -r '.state' \"$status_file\")\"\n    echo \"Repo Mind Light preload state: ${state}\"\n\n    if test \"$ready\" = 'true'; then\n      echo 'Repo Mind Light preload completed.'\n      exit 0\n    fi\n\n    if test \"$state\" = 'failed' || test \"$state\" = 'cancelled'; then\n      echo \"Repo Mind Light preload ended in unexpected state: ${state}\" >&2\n      docker logs \"$REPO_MIND_LIGHT_CONTAINER_NAME\" >&2 || true\n      exit 1\n    fi\n  fi\n\n  sleep 5\ndone\n\necho 'Timed out waiting for Repo Mind Light preload readiness.' >&2\ndocker logs \"$REPO_MIND_LIGHT_CONTAINER_NAME\" >&2 || true\nexit 1\n"

      - name: Download container images
        run: bash "${RUNNER_TEMP}/gh-aw/actions/download_docker_images.sh" ghcr.io/github/gh-aw-firewall/agent:0.25.46 ghcr.io/github/gh-aw-firewall/api-proxy:0.25.46 ghcr.io/github/gh-aw-firewall/cli-proxy:0.25.46 ghcr.io/github/gh-aw-firewall/squid:0.25.46 ghcr.io/github/gh-aw-mcpg:v0.3.8@sha256:71e102af76e1ce10b455d2a2ef5717d9cc4c135a5db06fbadcb58e6c1a950cd4 ghcr.io/github/github-mcp-server:v1.0.3@sha256:2ac27ef03461ef2b877031b838a7d1fd7f12b12d4ace7796d8cad91446d55959 node:lts-alpine@sha256:d1b3b4da11eefd5941e7f0b9cf17783fc99d9c6fc34884a665f40a06dbdfc94f
      - name: Generate Safe Outputs Config
        run: |
          mkdir -p "${RUNNER_TEMP}/gh-aw/safeoutputs"
          mkdir -p /tmp/gh-aw/safeoutputs
          mkdir -p /tmp/gh-aw/mcp-logs/safeoutputs
          cat > "${RUNNER_TEMP}/gh-aw/safeoutputs/config.json" << 'GH_AW_SAFE_OUTPUTS_CONFIG_688c359a3e0c3c9b_EOF'
          {"create_discussion":{"category":"audits","close_older_discussions":true,"expires":24,"fallback_to_issue":true,"max":1,"title_prefix":"[Issue Arborist] "},"create_issue":{"expires":48,"group":true,"max":5,"title_prefix":"[Parent] "},"create_report_incomplete_issue":{},"link_sub_issue":{"max":50},"missing_data":{},"missing_tool":{},"noop":{"max":1,"report-as-issue":"true"},"report_incomplete":{}}
          GH_AW_SAFE_OUTPUTS_CONFIG_688c359a3e0c3c9b_EOF
      - name: Generate Safe Outputs Tools
        env:
          GH_AW_TOOLS_META_JSON: |
            {
              "description_suffixes": {
                "create_discussion": " CONSTRAINTS: Maximum 1 discussion(s) can be created. Title will be prefixed with \"[Issue Arborist] \". Discussions will be created in category \"audits\".",
                "create_issue": " CONSTRAINTS: Maximum 5 issue(s) can be created. Title will be prefixed with \"[Parent] \".",
                "link_sub_issue": " CONSTRAINTS: Maximum 50 sub-issue link(s) can be created."
              },
              "repo_params": {},
              "dynamic_tools": []
            }
          GH_AW_VALIDATION_JSON: |
            {
              "create_discussion": {
                "defaultMax": 1,
                "fields": {
                  "body": {
                    "required": true,
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 65000
                  },
                  "category": {
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 128
                  },
                  "repo": {
                    "type": "string",
                    "maxLength": 256
                  },
                  "title": {
                    "required": true,
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 128
                  }
                }
              },
              "create_issue": {
                "defaultMax": 1,
                "fields": {
                  "body": {
                    "required": true,
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 65000
                  },
                  "fields": {
                    "type": "array"
                  },
                  "labels": {
                    "type": "array",
                    "itemType": "string",
                    "itemSanitize": true,
                    "itemMaxLength": 128
                  },
                  "parent": {
                    "issueOrPRNumber": true
                  },
                  "repo": {
                    "type": "string",
                    "maxLength": 256
                  },
                  "temporary_id": {
                    "type": "string"
                  },
                  "title": {
                    "required": true,
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 128
                  }
                }
              },
              "link_sub_issue": {
                "defaultMax": 5,
                "fields": {
                  "parent_issue_number": {
                    "required": true,
                    "issueNumberOrTemporaryId": true
                  },
                  "repo": {
                    "type": "string",
                    "maxLength": 256
                  },
                  "sub_issue_number": {
                    "required": true,
                    "issueNumberOrTemporaryId": true
                  }
                },
                "customValidation": "parentAndSubDifferent"
              },
              "missing_data": {
                "defaultMax": 20,
                "fields": {
                  "alternatives": {
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 256
                  },
                  "context": {
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 256
                  },
                  "data_type": {
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 128
                  },
                  "reason": {
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 256
                  }
                }
              },
              "missing_tool": {
                "defaultMax": 20,
                "fields": {
                  "alternatives": {
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 512
                  },
                  "reason": {
                    "required": true,
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 256
                  },
                  "tool": {
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 128
                  }
                }
              },
              "noop": {
                "defaultMax": 1,
                "fields": {
                  "message": {
                    "required": true,
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 65000
                  }
                }
              },
              "report_incomplete": {
                "defaultMax": 5,
                "fields": {
                  "details": {
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 65000
                  },
                  "reason": {
                    "required": true,
                    "type": "string",
                    "sanitize": true,
                    "maxLength": 1024
                  }
                }
              }
            }
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/generate_safe_outputs_tools.cjs');
            await main();
      - name: Generate Safe Outputs MCP Server Config
        id: safe-outputs-config
        run: |
          # Generate a secure random API key (360 bits of entropy, 40+ chars)
          # Mask immediately to prevent timing vulnerabilities
          API_KEY=$(openssl rand -base64 45 | tr -d '/+=')
          echo "::add-mask::${API_KEY}"
          
          PORT=3001
          
          # Set outputs for next steps
          {
            echo "safe_outputs_api_key=${API_KEY}"
            echo "safe_outputs_port=${PORT}"
          } >> "$GITHUB_OUTPUT"
          
